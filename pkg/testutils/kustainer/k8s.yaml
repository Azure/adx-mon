---
apiVersion: v1
kind: Namespace
metadata:
  name: {{NAMESPACE}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{NAME}}
  namespace: {{NAMESPACE}}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{APP}}
  template:
    metadata:
      labels:
        app: {{APP}}
    spec:
      containers:
        - name: {{NAME}}
          image: "mcr.microsoft.com/azuredataexplorer/kustainer-linux:latest"
          ports:
            - containerPort: 8080
              name: kustainer
          env:
            - name: ACCEPT_EULA
              value: "Y"
---
apiVersion: v1
kind: Service
metadata:
  name: {{NAME}}
  namespace: {{NAMESPACE}}
spec:
  selector:
    app: {{APP}}
  type: NodePort
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
